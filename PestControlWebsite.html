function useCountUp(target, duration = 2000, start = false) {
  const [count, setCount] = useState(0);
  useEffect(() => {
    if (!start) return;
    let startTime = null;
    const step = (ts) => {
      if (!startTime) startTime = ts;
      const p = Math.min((ts - startTime) / duration, 1);
      setCount(Math.floor(p * target));
      if (p < 1) requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  }, [target, duration, start]);
  return count;
}

function HomePage({ navigate }) {
  const [statsVisible, setStatsVisible] = useState(false);
  const [showExitPopup, setShowExitPopup] = useState(false);
  const statsRef = useRef(null);
  const carouselRef = useRef(null);
  const sectionStyle = { padding: "6rem 1.5rem", maxWidth: "1200px", margin: "0 auto" };

  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) setStatsVisible(true); }, { threshold: 0.3 });
    if (statsRef.current) obs.observe(statsRef.current);
    return () => obs.disconnect();
  }, []);

  useEffect(() => {
    const timer = setTimeout(() => {
      const h = (e) => { if (e.clientY <= 0) { setShowExitPopup(true); document.removeEventListener("mouseleave", h); } };
      document.addEventListener("mouseleave", h);
      return () => document.removeEventListener("mouseleave", h);
    }, 8000);
    return () => clearTimeout(timer);
  }, []);

  useEffect(() => {
    const el = carouselRef.current;
    if (!el) return;
    let pos = 0;
    let raf;
    const animate = () => { pos += 0.5; if (pos >= el.scrollWidth / 2) pos = 0; el.scrollLeft = pos; raf = requestAnimationFrame(animate); };
    raf = requestAnimationFrame(animate);
    return () => cancelAnimationFrame(raf);
  }, []);

  return (
    <>
      <style>{`
        @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
        @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

      <section id="reviews" style={{ background: "rgba(255,255,255,0.015)", borderTop: "1px solid rgba(255,255,255,0.06)", padding: "6rem 0", overflow: "hidden" }}>
        <div style={{ textAlign: "center", marginBottom: "3rem", padding: "0 1.5rem" }}>
          <div style={{ color: gold, fontSize: "0.85rem", fontWeight: 700, letterSpacing: "0.2em", textTransform: "uppercase", marginBottom: "1rem" }}>What Clients Say</div>
          <h2 style={{ fontFamily: "'Playfair Display', serif", fontSize: "clamp(2rem, 4vw, 3rem)", fontWeight: 800, color: "#f9fafb" }}>4,800+ Five-Star Reviews</h2>

      {/* SERVICE AREAS */}
      <section style={{ ...sectionStyle }}>
        <div style={{ textAlign: "center", marginBottom: "3rem" }}>

          <h2 style={{ fontFamily: "'Playfair Display', serif", fontSize: "clamp(2rem, 4vw, 3rem)", fontWeight: 800, color: "#f9fafb" }}>Serving the Entire GTA</h2>
        </div>
        <div style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: "20px", padding: "3rem", display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(150px, 1fr))", gap: "1.5rem" }}>
          {["Toronto", "Mississauga", "Brampton", "Markham", "Vaughan", "North York", "Scarborough", "Etobicoke", "Pickering", "Ajax", "Oakville", "Burlington"].map(city => (

      {/* FAQ */}
      <section id="faq" style={{ background: "rgba(255,255,255,0.015)", borderTop: "1px solid rgba(255,255,255,0.06)" }}>
        <div style={{ ...sectionStyle, maxWidth: "800px" }}>
          <div style={{ textAlign: "center", marginBottom: "4rem" }}>
            <div style={{ color: gold, fontSize: "0.85rem", fontWeight: 700, letterSpacing: "0.2em", textTransform: "uppercase", marginBottom: "1rem" }}>FAQ</div>
            <h2 style={{ fontFamily: "'Playfair Display', serif", fontSize: "clamp(2rem, 4vw, 3rem)", fontWeight: 800, color: "#f9fafb" }}>Common Questions</h2>

          <p style={{ color: "#9ca3af", lineHeight: 1.7 }}>No obligation. A certified technician will contact you within 60 minutes.</p>
        </div>
        <LeadForm />

      {/* FOOTER */}
      <footer style={{ background: "#030305", borderTop: "1px solid rgba(255,255,255,0.06)", padding: "4rem 1.5rem 2rem" }}>
        <div style={{ maxWidth: "1200px", margin: "0 auto" }}>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(200px, 1fr))", gap: "3rem", marginBottom: "3rem" }}>
            <div>
              <div style={{ fontFamily: "'Playfair Display', serif", fontSize: "1.75rem", fontWeight: 800, color: gold, marginBottom: "1rem" }}>{BRAND}</div>
              <p style={{ color: "#6b7280", fontSize: "0.9rem", lineHeight: 1.7, marginBottom: "1.5rem" }}>Toronto's most trusted pest control. Licensed, insured, and guaranteed since 2009.</p>
              <a href={`tel:${PHONE}`} style={{ display: "inline-block", background: `linear-gradient(135deg, ${gold}, #c4a855)`, color: "#0a0a0a", padding: "0.75rem 1.5rem", borderRadius: "10px", fontWeight: 700, fontSize: "0.95rem", textDecoration: "none" }}>📞 Emergency Line</a>
            </div>

              <h4 style={{ color: "#f9fafb", fontWeight: 700, marginBottom: "1.25rem", fontSize: "0.9rem", textTransform: "uppercase", letterSpacing: "0.1em" }}>Services</h4>
              {services.slice(0, 5).map(s => (
                <button key={s.slug} onClick={() => navigate("service", null, s.slug)} style={{ display: "block", background: "none", border: "none", color: "#6b7280", fontSize: "0.9rem", marginBottom: "0.6rem", cursor: "pointer", padding: 0, textAlign: "left" }}

/* ─── ROUTER / ROOT ──────────────────────────────────── */
export default function App() {
  const [page, setPage] = useState("home");
  const [serviceSlug, setServiceSlug] = useState(null);

  const navigate = (target, anchor, slug) => {
    setPage(target);
    if (slug) setServiceSlug(slug);
    if (anchor) {
      setTimeout(() => {
        document.getElementById(anchor)?.scrollIntoView({ behavior: "smooth" });
      }, 100);
    } else {
      window.scrollTo(0, 0);
    }
  };

  const currentService = services.find(s => s.slug === serviceSlug);

  return (
    <div style={{ background: darkBg, color: "#f9fafb", fontFamily: "'DM Sans', 'Helvetica Neue', sans-serif", minHeight: "100vh", overflowX: "hidden" }}>
      <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
      <Nav navigate={navigate} currentPage={page} />
      <FloatingButtons navigate={navigate} />
      {page === "home" && <HomePage navigate={navigate} />}
      {page === "service" && currentService && <ServicePage service={currentService} navigate={navigate} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
